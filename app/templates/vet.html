<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ dog_name }} — record</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; }
    h2 { margin-top: 1.5rem; border-bottom: 1px solid #ccc; padding-bottom: 0.2rem; }
    .row { margin: 0.4rem 0; }
    label { display: block; font-weight: bold; margin-top: 0.8rem; }
    input[type=text] {
      font-size: 1.1rem; padding: 0.5rem; width: 100%;
      box-sizing: border-box; font-weight: normal; margin-top: 0.2rem;
    }
    button { font-size: 1.1rem; padding: 0.6rem 1.4rem; margin-top: 1.2rem; }
  </style>
</head>
<body>
  <h1>{{ dog_name }}</h1>
  <div class="row">{{ breed }}{% if microchip %} · microchip {{ microchip }}{% endif %}</div>

  <h2>Owner</h2>
  <div class="row">{{ owner_name }}</div>
  <div class="row">{{ phone }}{% if email %} · {{ email }}{% endif %}</div>

  <h2>Clinical record</h2>
  {% if record %}
    <form method="post" action="/d/{{ token }}/edit">
      {% for key, value in record.items() %}
        <label>{{ key }}
          <input type="text" name="{{ key }}" value="{{ value }}">
        </label>
      {% endfor %}
      <button type="submit">Save</button>
    </form>
  {% else %}
    <div class="row">No clinical entries yet.</div>
  {% endif %}
</body>
</html>
